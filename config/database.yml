# SQLite for development and test
# PostgreSQL for production

default: &default
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  queue:
    <<: *default
    database: storage/development_queue.sqlite3
    migrations_paths: db/queue_migrate

test:
  <<: *default
  database: storage/test.sqlite3

<% if Rails.env.production?
  db_name     = Rails.app.creds.require(:database, :name)
  db_username = Rails.app.creds.require(:database, :username)
  db_password = Rails.app.creds.require(:database, :password)
  db_host     = Rails.app.creds.option(:database, :host, default: "localhost")
  db_port     = Rails.app.creds.option(:database, :port, default: 5432)
end %>

production:
  primary:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    database: "<%= db_name %>"
    username: "<%= db_username %>"
    password: "<%= db_password %>"
    host: "<%= db_host %>"
    port: "<%= db_port %>"
  cache:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    database: "<%= Rails.app.creds.option(:database, :cache_name, default: "#{db_name}_cache") %>"
    username: "<%= db_username %>"
    password: "<%= db_password %>"
    host: "<%= db_host %>"
    port: "<%= db_port %>"
    migrations_paths: db/cache_migrate
  queue:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    database: "<%= Rails.app.creds.option(:database, :queue_name, default: "#{db_name}_queue") %>"
    username: "<%= db_username %>"
    password: "<%= db_password %>"
    host: "<%= db_host %>"
    port: "<%= db_port %>"
    migrations_paths: db/queue_migrate
  cable:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    database: "<%= Rails.app.creds.option(:database, :cable_name, default: "#{db_name}_cable") %>"
    username: "<%= db_username %>"
    password: "<%= db_password %>"
    host: "<%= db_host %>"
    port: "<%= db_port %>"
    migrations_paths: db/cable_migrate
